repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        files: ^backend/
        additional_dependencies: [types-redis, types-python-jose, sqlalchemy[mypy]]
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: node
        entry: bash -c 'cd frontend && npx eslint --fix src/'
        files: \.(ts|tsx)$
        pass_filenames: false
      - id: tsc
        name: TypeScript check
        language: node
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        files: \.(ts|tsx)$
        pass_filenames: false
